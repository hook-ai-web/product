      tags:['#장기요양','#요양원','#재가요양','#치매돌봄','#요양보호사'],
    },
  },
};

function readTime(txt) { return Math.max(1, Math.round((txt||'').length / 300)) + '분'; }

// ── 매거진 히어로 구성 ────────────────────────────────────────────
function buildCatHero() {
  const sm = SEC_META[section] || { label:section, icon:'📌', bg:'#eee', fg:'#333', desc:'' };
  const bm = BM[board] || BM.all;

  document.getElementById('bc-section').textContent = sm.label;
  if (board !== 'all') {
    document.getElementById('bc-sep').style.display = 'inline';
    const bcBoard = document.getElementById('bc-board');
    bcBoard.textContent = bm.label;
    bcBoard.className = 'current';
  }

  const iconEl = document.getElementById('cat-icon-el');
  iconEl.style.background = sm.bg;
  iconEl.innerHTML = sm.icon;
  document.getElementById('cat-title-el').textContent = sm.label + (board !== 'all' ? ' · ' + bm.label : '');
  document.getElementById('cat-desc-el').textContent  = sm.desc;
  document.title = sm.label + (board !== 'all' ? ' · ' + bm.label : '') + ' — 2막이음';

  document.getElementById('sub-tabs-el').innerHTML = (BOARDS[section] || []).map(([b, lbl]) =>
    `<button class="sub-tab ${b===board?'active':''}" onclick="location.href='/board.html?section=${section}&board=${b}'">${lbl}</button>`
  ).join('');
}

// ── 사이드바 ──────────────────────────────────────────────────────
function buildSidebar() {
  const cfg = (SIDEBAR[section]?.[board]) || (SIDEBAR[section]?.default);
  if (!cfg) return;
  const cl = cfg.checklist;
  const cardStyle = cl.bg ? `style="background:${cl.bg};border-color:${cl.border||'var(--color-border)'}"` : '';
  const titleStyle = cl.fg ? `style="color:${cl.fg}"` : '';
  document.getElementById('sidebar').innerHTML = `
    <div class="side-card" ${cardStyle}>
      <div class="side-title" ${titleStyle}>${cl.title}</div>
      <div class="checklist">
        ${cl.items.map(i => `<div class="check-item"><i class="ti ti-circle-check"></i>${i}</div>`).join('')}
      </div>
    </div>
    <div class="side-card">
      <div class="side-title"><i class="ti ti-link"></i> 바로 찾기</div>
      <div class="quick-links">
        ${cfg.links.map(l=>`<a href="${l.h}" class="quick-link">${l.t}<i class="ti ti-chevron-right"></i></a>`).join('')}
      </div>
    </div>
    <div class="side-card">
      <div class="side-title"><i class="ti ti-tag"></i> 관련 태그</div>
      <div class="tag-cloud">
        ${cfg.tags.map(t=>`<a href="/search.html?q=${encodeURIComponent(t.replace('#',''))}" class="tag-chip">${t}</a>`).join('')}
      </div>
    </div>`;
}

// ── 매거진 글 목록 로드 ───────────────────────────────────────────
async function loadMag(page = 1) {
  const { total, rows } = await api(`/api/posts?section=${section}&board=${board}&page=${page}&limit=${LIMIT}`);
  const featuredWrap = document.getElementById('featured-wrap');
  const listEl       = document.getElementById('article-list');

  if (!rows.length) {
    featuredWrap.innerHTML = '';
    listEl.innerHTML = '<p style="padding:var(--sp-6);text-align:center;color:var(--color-text-muted)">게시글이 없습니다.</p>';
    return;
  }

  // 최신글 피처드 카드 (이번주 추천 → 최신글)
  const [feat, ...rest] = rows;
  const fb = BM[feat.board] || BM.all;
  featuredWrap.innerHTML = `
    <a href="/post.html?id=${feat.id}" class="featured-card">
      <div class="featured-thumb" style="background:${fb.bg};display:flex;align-items:center;justify-content:center"><img src="${fb.icon}" style="width:52px;height:52px"></div>
      <div class="featured-body">
        <div class="feat-tag">최신글</div>
        <h2 class="feat-title">${feat.title}</h2>
        <p class="feat-desc">${(feat.content||'').slice(0,120)}</p>
        <div class="feat-meta">
          <span><i class="ti ti-clock"></i> ${readTime(feat.content)} 읽기</span>
          <span><i class="ti ti-eye"></i> ${feat.view_count.toLocaleString()}명 읽음</span>
          <span><i class="ti ti-user"></i> ${feat.author}</span>
        </div>
      </div>
    </a>`;

  listEl.innerHTML = rest.map(r => {
    const rb = BM[r.board] || BM.all;
    return `
      <a href="/post.html?id=${r.id}" class="article-item">
        <div class="article-thumb" style="background:${rb.bg}"><img src="${rb.icon}" style="width:40px;height:40px"></div>
        <div class="article-content">
          <div class="art-tag">${rb.label}</div>
          <div class="art-title">${r.title}</div>
          <div class="art-meta"><i class="ti ti-eye"></i>${r.view_count} <i class="ti ti-clock"></i>${readTime(r.content)}</div>
        </div>
        ${r.view_count > 3000 ? '<span class="badge badge-hot" style="flex-shrink:0;align-self:flex-start">인기글</span>' : ''}
      </a>`;
  }).join('');

  const pages = Math.ceil(total / LIMIT);
  if (pages > 1) {
    let pg = '<div class="pagination">';
    if (page>1) pg += `<a href="#" class="page-btn" onclick="loadMag(${page-1});return false"><i class="ti ti-chevron-left"></i></a>`;
    for (let i=1;i<=pages;i++) pg += `<a href="#" class="page-btn ${i===page?'active':''}" onclick="loadMag(${i});return false">${i}</a>`;
    if (page<pages) pg += `<a href="#" class="page-btn" onclick="loadMag(${page+1});return false"><i class="ti ti-chevron-right"></i></a>`;
    pg += '</div>';
    document.getElementById('pagination-mag').innerHTML = pg;
  }
}

// ── 커뮤니티 일반 목록 ───────────────────────────────────────────
function buildBoardTabs() {
  const tabs = document.getElementById('board-tabs');
  if (tabs) tabs.innerHTML = (BOARDS[section]||[]).map(([b,lbl])=>
    `<a href="/board.html?section=${section}&board=${b}" class="${b===board?'active':''}">${lbl}</a>`
  ).join('');
  const h2 = document.getElementById('board-title');
  if (h2) { h2.textContent = (BM[board]?.label || board); document.title = h2.textContent + ' — 2막이음'; }
}

let localRegion = new URLSearchParams(location.search).get('region') || '';

function selectRegion(r) {
  localRegion = r;
  document.querySelectorAll('.region-pill').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (r || '전체'));
  });
  loadStd(1);
}

async function loadStd(page = 1) {
  const region = board === 'local'
    ? localRegion
    : (document.getElementById('filter-region')?.value || '');
  const trade  = document.getElementById('filter-trade')?.value  || '';
  let url = `/api/posts?section=${section}&board=${board}&page=${page}&limit=${LIMIT}`;
  if (region) url += `&region=${encodeURIComponent(region)}`;
  if (trade)  url += `&trade_type=${encodeURIComponent(trade)}`;

  const { total, rows } = await api(url);
  const listEl = document.getElementById('post-list');

  if (!rows.length) {
    listEl.innerHTML = '<p style="padding:var(--sp-6);text-align:center;color:var(--color-text-muted)">게시글이 없습니다.</p>';
    document.getElementById('pagination-std').innerHTML = '';
    return;
  }

  listEl.innerHTML = rows.map(r => {
    const title = r.is_anonymous ? `[익명] ${r.title}` : r.title;
    const typeClass = {팝니다:'tag-sell',삽니다:'tag-buy',나눔합니다:'tag-share',교환합니다:'tag-trade'}[r.trade_type] || '';
    const badge = board === 'local'
      ? (r.region ? `<span class="market-tag" style="margin-right:var(--sp-2);background:#E8F5E9;color:#2e7d32;border-color:#a5d6a7">📍 ${r.region}</span>` : '')
      : board === 'challenge'
        ? (r.trade_type ? `<span class="market-tag" style="margin-right:var(--sp-2);background:#e8f8f0;color:#166534;border-color:#86efac">🏃 ${r.trade_type}</span>` : '')
        : (r.trade_type ? `<span class="market-tag ${typeClass}" style="margin-right:var(--sp-2)">${r.trade_type}</span>` : '');
    const price = r.price > 0 ? `<strong style="color:var(--color-accent);margin-left:var(--sp-2)">${r.price.toLocaleString()}원</strong>` : '';
    return `
      <div class="post-row">
        <div class="title">${badge}<a href="/post.html?id=${r.id}">${title}</a>${price}</div>
        <div class="meta">${r.author} · ${fmtDate(r.created_at).slice(0,10)}</div>
        <div class="meta"><i class="ti ti-eye" style="font-size:12px"></i>${r.view_count}</div>
      </div>`;
  }).join('');

  const pages = Math.ceil(total / LIMIT);
  if (pages > 1) {
    let pg = '<div class="pagination">';
    if (page>1) pg+=`<a href="#" class="page-btn" onclick="loadStd(${page-1});return false"><i class="ti ti-chevron-left"></i></a>`;
    for (let i=1;i<=pages;i++) pg+=`<a href="#" class="page-btn ${i===page?'active':''}" onclick="loadStd(${i});return false">${i}</a>`;
    if (page<pages) pg+=`<a href="#" class="page-btn" onclick="loadStd(${page+1});return false"><i class="ti ti-chevron-right"></i></a>`;
    pg += '</div>';
    document.getElementById('pagination-std').innerHTML = pg;
  }
}

// ── 초기화 ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  if (IS_MAG) {
    document.getElementById('mag-wrap').style.display = 'block';
    buildCatHero();
    buildSidebar();
    loadMag();
    const { loggedIn, user } = await api('/api/auth/me');
    if (loggedIn && user.role === 'admin') {
      document.getElementById('write-mag-wrap').style.display = 'block';
      document.getElementById('write-mag-btn').href = `/write.html?section=${section}&board=${board}`;
    }
  } else {
    document.getElementById('std-wrap').style.display = 'block';
    document.getElementById('market-filters').style.display = board === 'market' ? 'flex' : 'none';
    if (board === 'local') {
      document.getElementById('local-region-bar').style.display = 'block';
      // URL에 region 파라미터가 있으면 해당 버튼 활성화
      if (localRegion) {
        document.querySelectorAll('.region-pill').forEach(b => {
          b.classList.toggle('active', b.textContent.trim() === localRegion);
        });
      }
    }
    buildBoardTabs();
    loadStd();
    const { loggedIn } = await api('/api/auth/me');
    const btn = document.getElementById('write-btn');
    btn.style.display = 'inline-flex';
    if (loggedIn) {
      btn.href = `/write.html?section=${section}&board=${board}`;
    } else {
      btn.href = '/login.html';
    }
  }
});
</script>
</body>
</html>
