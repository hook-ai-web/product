<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프로필 설정 — 2막이음</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/icons/2mak_ieum_favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .form-box { max-width: 440px; }
    .field-hint { font-size: .83rem; color: var(--color-text-muted); margin-top: .3rem; }
    .terms-box {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: .8rem 1rem;
      display: flex; flex-direction: column; gap: .55rem;
    }
    .terms-item {
      display: flex; align-items: center; gap: .55rem;
      font-size: .93rem; cursor: pointer;
    }
    .terms-item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .terms-item .badge-req { color: var(--color-primary); font-size: .78rem; font-weight: 600; }
    .terms-item .badge-opt { color: var(--color-text-muted); font-size: .78rem; }
    .terms-item a { color: var(--color-primary); text-decoration: none; margin-left: auto; font-size: .85rem; }
    .terms-all { font-weight: 700; font-size: .98rem; padding-bottom: .55rem; border-bottom: 1px solid var(--color-border); }
    .terms-divider { border: none; border-top: 1px solid var(--color-border); margin: 0; }
    .social-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: var(--color-bg-subtle); border-radius: 999px;
      padding: .3rem .8rem; font-size: .85rem; color: var(--color-text-muted);
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>
<main class="container">
  <div class="form-box">
    <h2>👤 프로필 설정</h2>
    <p style="color:var(--color-text-muted);font-size:.93rem;margin-bottom:1rem">
      2막이음에서 사용할 닉네임과 약관 동의를 완료해주세요.
    </p>

    <form id="profile-form" novalidate>
      <!-- 닉네임 -->
      <div class="form-group">
        <label for="nickname">닉네임 *</label>
        <p class="field-hint" style="margin-top:0;margin-bottom:.4rem">다른 유저와 겹치지 않도록 입력해주세요. (2~20자)</p>
        <input type="text" id="nickname" placeholder="별명 (2~20자)" maxlength="20" required>
      </div>

      <!-- 연락처 -->
      <div class="form-group">
        <label for="phone">연락처 <span style="color:var(--color-text-muted);font-weight:400">(선택)</span></label>
        <input type="tel" id="phone" placeholder="010-0000-0000" autocomplete="tel">
      </div>

      <!-- 약관동의 -->
      <div class="form-group">
        <label>약관동의</label>
        <div class="terms-box">
          <label class="terms-item terms-all">
            <input type="checkbox" id="terms-all" onchange="toggleAll(this)">
            <span>전체동의</span>
            <span style="font-size:.78rem;font-weight:400;color:var(--color-text-muted);margin-left:.25rem">선택항목에 대한 동의 포함</span>
          </label>
          <hr class="terms-divider">
          <label class="terms-item">
            <input type="checkbox" class="terms-req" name="terms14" onchange="syncAll()">
            <span>만 14세 이상입니다</span>
            <span class="badge-req">(필수)</span>
          </label>
          <label class="terms-item">
            <input type="checkbox" class="terms-req" name="termsUse" onchange="syncAll()">
            <span>이용약관</span>
            <span class="badge-req">(필수)</span>
            <a href="#" onclick="showTerms('use');return false">›</a>
          </label>
          <label class="terms-item">
            <input type="checkbox" class="terms-opt" name="termsMarketing" onchange="syncAll()">
            <span>개인정보 마케팅 활용 동의</span>
            <span class="badge-opt">(선택)</span>
            <a href="#" onclick="showTerms('marketing');return false">›</a>
          </label>
        </div>
      </div>

      <div id="error-msg" style="color:var(--danger);font-size:.93rem;margin-bottom:.8rem;display:none"></div>
      <button type="submit" class="btn btn-primary btn-full">시작하기</button>
    </form>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
// pending 상태 확인
(async () => {
  try {
    const data = await api('/api/auth/pending-profile');
    if (!data.pending) {
      // 이미 로그인됐거나 잘못된 접근
      location.href = '/index.html';
      return;
    }
    if (data.suggestedNickname) {
      document.getElementById('nickname').value = data.suggestedNickname;
    }
  } catch {
    location.href = '/index.html';
  }
})();

function toggleAll(el) {
  document.querySelectorAll('.terms-req, .terms-opt').forEach(cb => cb.checked = el.checked);
}
function syncAll() {
  const all = [...document.querySelectorAll('.terms-req, .terms-opt')];
  document.getElementById('terms-all').checked = all.every(cb => cb.checked);
}
function showTerms(type) {
  const texts = {
    use: '이용약관\n\n2막이음 서비스 이용약관입니다.\n(추후 실제 약관으로 교체 예정)',
    marketing: '개인정보 마케팅 활용 동의\n\n(추후 실제 약관으로 교체 예정)',
  };
  alert(texts[type]);
}

document.getElementById('profile-form').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  const nickname = document.getElementById('nickname').value.trim();
  const phone    = document.getElementById('phone').value.trim();

  if (nickname.length < 2) { showErr('닉네임은 2자 이상 입력해주세요.'); return; }
  if (!document.querySelector('[name="terms14"]').checked ||
      !document.querySelector('[name="termsUse"]').checked) {
    showErr('필수 약관에 동의해주세요.'); return;
  }

  try {
    const result = await api('/api/auth/complete-profile', { method: 'POST', body: { nickname, phone } });
    showToast('가입 완료! 환영합니다 🎉');
    setTimeout(() => location.href = result.ssoRedirect || '/index.html', 1000);
  } catch(err) {
    showErr(err.message);
  }

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
