<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — 2막이음</title>
  <!-- Fonts + Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="icon" type="image/svg+xml" href="/icons/2mak_ieum_favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<main class="container">
  <div class="form-box">
    <h2>🔑 로그인</h2>

    <!-- 소셜 로그인 -->
    <div style="display:flex;flex-direction:column;gap:.65rem;margin-bottom:1.4rem">
      <a href="/auth/kakao" class="social-btn kakao-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2C5.582 2 2 4.896 2 8.45c0 2.235 1.488 4.195 3.732 5.328L4.8 17.1c-.08.27.2.49.44.34l4.06-2.69c.23.02.46.03.7.03 4.418 0 8-2.896 8-6.45S14.418 2 10 2z" fill="#3C1E1E"/></svg>
        카카오로 로그인
      </a>
      <a href="/auth/naver" class="social-btn naver-btn">
        <span style="font-weight:900;font-size:15px;line-height:1;color:#fff">N</span>
        네이버로 로그인
      </a>
      <a href="/auth/google" class="social-btn google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.2 30.2 0 24 0 14.7 0 6.7 5.4 2.8 13.3l7.8 6.1C12.5 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.6 28.6A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2.1 1.4-4.7 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.8 6C6.6 42.6 14.7 48 24 48z"/></svg>
        Google로 로그인
      </a>
    </div>

    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.2rem">
      <hr style="flex:1;border-color:var(--color-border)">
      <span style="font-size:var(--text-xs);color:var(--color-text-muted)">또는 이메일로 로그인</span>
      <hr style="flex:1;border-color:var(--color-border)">
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="이메일 주소" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호" required autocomplete="current-password">
      </div>
      <div id="error-msg" style="color:var(--danger);font-size:.95rem;margin-bottom:.8rem;display:none"></div>
      <button type="submit" class="btn btn-primary btn-full">로그인</button>
    </form>
    <p style="text-align:center;margin-top:1.2rem;font-size:.95rem">
      아직 계정이 없으신가요? <a href="/register.html">회원가입</a>
    </p>
  </div>

  <style>
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      padding: .75rem 1rem;
      border-radius: var(--radius-md);
      font-size: var(--text-sm); font-weight: 600;
      text-decoration: none; cursor: pointer;
      transition: opacity .15s;
    }
    .social-btn:hover { opacity: .88; text-decoration: none; }
    .kakao-btn  { background: #FEE500; color: #3C1E1E; }
    .naver-btn  { background: #03C75A; color: #fff; }
    .google-btn { background: #fff; color: #3c4043; border: 1.5px solid #dadce0; }
  </style>
</main>

<script src="/js/common.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  try {
    const result = await api('/api/auth/login', {
      method: 'POST',
      body: {
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      },
    });
    location.href = result.ssoRedirect
      || new URLSearchParams(location.search).get('next')
      || '/index.html';
  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
