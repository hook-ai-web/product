<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>공지&이벤트 — 2막이음</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="icon" type="image/svg+xml" href="/icons/2mak_ieum_favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .filter-bar { display:flex; gap:.5rem; margin-bottom:0; flex-wrap:wrap; }
    .filter-chip {
      padding:.35rem .9rem; border:1.5px solid var(--color-border); border-radius:999px;
      font-size:.85rem; font-weight:600; cursor:pointer; background:var(--color-bg);
      color:var(--color-text-muted); transition:all .12s;
    }
    .filter-chip.active { border-color:var(--color-primary); background:var(--color-primary); color:#fff; }

    .notice-badge { flex-shrink:0; font-size:.75rem; font-weight:700; padding:.18rem .5rem; border-radius:4px; }
    .badge-notice { background:#e0e7ff; color:#3730a3; }
    .badge-event  { background:#fef3c7; color:#92400e; }
    .badge-quote  { background:#e8f5e9; color:#1b5e20; }

    /* 게시판 행 */
    .notice-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--sp-3);
      align-items: center;
      padding: var(--sp-4) var(--sp-2);
      border-bottom: 1px solid var(--color-border);
      font-size: var(--text-sm);
    }
    .notice-row:hover { background: var(--color-bg-subtle); cursor: pointer; }
    .notice-row .nr-title {
      display: flex; align-items: center; gap: .5rem;
      font-weight: 500; color: var(--color-text-primary);
      min-width: 0;
    }
    .notice-row .nr-title span.title-text {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .notice-chevron { flex-shrink:0; transition: transform .2s; color: var(--color-text-muted); font-size: 14px; margin-left: auto; }
    .notice-row.open .notice-chevron { transform: rotate(180deg); }

    .nr-right { display:flex; align-items:center; gap:.4rem; flex-shrink:0; }
    .nr-date { color: var(--color-text-muted); font-size: var(--text-xs); white-space: nowrap; }

    /* 아코디언 펼침 */
    .notice-expand {
      display: none;
      padding: .85rem var(--sp-2) 1rem;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg-subtle);
      font-size: .95rem; line-height: 1.9;
      color: var(--color-text-secondary);
      white-space: pre-wrap;
    }
    .notice-row.open + .notice-expand { display: block; }
    .q-author { display:block; margin-top:.45rem; font-size:.82rem; color:var(--color-text-muted); font-weight:600; }
    .notice-img { width:100%; max-height:320px; object-fit:cover; border-radius:8px; margin-bottom:.75rem; display:block; }

    /* 관리자 인라인 버튼 */
    .btn-pin { font-size:.7rem; padding:.16rem .45rem; border-radius:4px; font-weight:700; cursor:pointer; border:1.5px solid; transition:all .12s; white-space:nowrap; }
    .btn-pin.on  { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }
    .btn-pin.off { background:var(--color-bg); color:var(--color-text-muted); border-color:var(--color-border); }
    .btn-row-edit { font-size:.7rem; padding:.16rem .45rem; border-radius:4px; font-weight:600; cursor:pointer; border:1.5px solid var(--color-border); background:var(--color-bg); color:var(--color-text-muted); transition:all .12s; }
    .btn-row-edit:hover { background:var(--color-bg-subtle); }
    .btn-row-del { font-size:.7rem; padding:.16rem .45rem; border-radius:4px; font-weight:600; cursor:pointer; border:1.5px solid #fca5a5; background:#fff; color:#dc2626; transition:all .12s; }
    .btn-row-del:hover { background:#fef2f2; }

    /* 모달 */
    .write-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 9000;
      align-items: center; justify-content: center;
    }
    .write-modal-card {
      background: #fff; border-radius: 16px; padding: 1.75rem 1.5rem;
      width: min(520px, 92vw); max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display:block; font-weight:600; font-size:.9rem; margin-bottom:.4rem; color:var(--color-text-primary); }
    .form-input {
      width: 100%; padding: .7rem .9rem; border: 1.5px solid var(--color-border);
      border-radius: 8px; font-size: 1rem; font-family: inherit;
      box-sizing: border-box; transition: border-color .12s;
    }
    .form-input:focus { outline: none; border-color: var(--color-primary); }
    .form-textarea {
      width: 100%; padding: .7rem .9rem; border: 1.5px solid var(--color-border);
      border-radius: 8px; font-size: 1rem; font-family: inherit;
      resize: vertical; min-height: 120px; box-sizing: border-box; transition: border-color .12s;
    }
    .form-textarea:focus { outline: none; border-color: var(--color-primary); }
    .radio-row { display:flex; gap:1.2rem; }
    .radio-row label { display:flex; align-items:center; gap:.4rem; font-weight:400; cursor:pointer; }

    /* 이미지 업로드 */
    .img-upload-label {
      display: flex; align-items: center; gap: .5rem;
      padding: .65rem .9rem; border: 1.5px dashed var(--color-border);
      border-radius: 8px; cursor: pointer; font-size: .9rem; color: var(--color-text-muted);
      transition: border-color .12s;
    }
    .img-upload-label:hover { border-color: var(--color-primary); color: var(--color-primary); }
    #m-img-preview { width:100%; border-radius:8px; margin-top:.5rem; display:none; }

    @media (max-width: 480px) {
      .notice-row { grid-template-columns: 1fr; }
      .nr-date { display: none; }
    }
  </style>
</head>
<body>
<div id="header-wrap"></div>
<main class="container" style="max-width:720px;padding-top:2rem;padding-bottom:4rem">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <h2 style="margin:0">📢 공지&amp;이벤트</h2>
    <a href="/community.html" style="font-size:.88rem;color:var(--color-text-muted)">← 커뮤니티</a>
  </div>

  <div id="admin-bar" style="display:none;margin-bottom:1rem;gap:.5rem;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary btn-sm" onclick="openModal('notice')">+ 공지 등록</button>
    <button class="btn btn-outline btn-sm" onclick="openModal('quote')">+ 명언 등록</button>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;border-bottom:2px solid var(--color-text-primary);padding-bottom:.75rem">
    <div class="filter-bar">
      <button class="filter-chip active" data-type="all"    onclick="setFilter('all',this)">전체</button>
      <button class="filter-chip" data-type="notice" onclick="setFilter('notice',this)">공지</button>
      <button class="filter-chip" data-type="event"  onclick="setFilter('event',this)">이벤트</button>
      <button class="filter-chip" data-type="quote"  onclick="setFilter('quote',this)">오늘의 명언</button>
    </div>
    <span id="total-count" style="font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap"></span>
  </div>

  <div id="notice-list"></div>

  <div id="load-more" style="text-align:center;margin-top:1.2rem;display:none">
    <button class="btn btn-outline" onclick="loadMore()">더 보기</button>
  </div>
</main>
<div id="footer-wrap"></div>

<!-- 작성/수정 모달 -->
<div id="write-modal" class="write-modal-overlay">
  <div class="write-modal-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <h2 id="modal-heading" style="margin:0;font-size:1.15rem;font-weight:700">공지 등록</h2>
      <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--color-text-muted);padding:.25rem"><i class="ti ti-x"></i></button>
    </div>

    <div id="modal-type-row" class="form-group">
      <label>유형</label>
      <div class="radio-row">
        <label><input type="radio" name="m-type" value="notice" id="rt-notice" checked> 공지</label>
        <label><input type="radio" name="m-type" value="event"  id="rt-event"> 이벤트</label>
      </div>
    </div>

    <div id="modal-author-row" class="form-group" style="display:none">
      <label for="m-author">저자 / 출처 <span style="font-weight:400;color:var(--color-text-muted)">(선택)</span></label>
      <input type="text" id="m-author" placeholder="예) 공자, 마틴 루터 킹" class="form-input">
    </div>

    <div id="modal-title-row" class="form-group">
      <label for="m-title">제목</label>
      <input type="text" id="m-title" placeholder="제목을 입력하세요" class="form-input">
    </div>

    <div class="form-group">
      <label for="m-content" id="m-content-label">내용 <span style="font-weight:400;color:var(--color-text-muted)">(선택)</span></label>
      <textarea id="m-content" class="form-textarea" placeholder="본문 내용을 입력하세요 (클릭 시 펼쳐집니다)"></textarea>
    </div>

    <div id="modal-image-row" class="form-group">
      <label>사진 <span style="font-weight:400;color:var(--color-text-muted)">(선택)</span></label>
      <label class="img-upload-label" for="m-image">
        <i class="ti ti-photo"></i> 사진 선택
      </label>
      <input type="file" id="m-image" accept="image/*" style="display:none" onchange="onImageSelected(this)">
      <img id="m-img-preview" alt="미리보기">
    </div>

    <div id="modal-pinned-row" class="form-group">
      <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-weight:500">
        <input type="checkbox" id="m-pinned" checked style="width:18px;height:18px;accent-color:var(--color-primary)">
        커뮤니티 메인에 표시
      </label>
    </div>

    <div style="display:flex;gap:.75rem;margin-top:.5rem">
      <button class="btn btn-primary" onclick="submitModal()" style="flex:1" id="modal-submit-btn">등록하기</button>
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
let currentType = 'all', page = 1, totalCount = 0;
const LIMIT = 20;
let isAdmin = false;
let modalMode = 'notice';
let editId = null;

// ── 이미지 선택 미리보기 ──────────────────────────────────────────────
function onImageSelected(input) {
  const preview = document.getElementById('m-img-preview');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
    reader.readAsDataURL(input.files[0]);
    document.getElementById('m-img-cur').style.display = 'none';
  }
}

// ── 오늘 명언 인덱스 ────────────────────────────────────────────────
function todayQuoteIdx(rows) {
  if (!rows.length) return -1;
  return Math.floor(Date.now() / 86400000) % rows.length;
}

// ── 공지/이벤트 행 렌더 ─────────────────────────────────────────────
function renderNoticeRow(r) {
  const badgeCls = r.type === 'event' ? 'badge-event' : 'badge-notice';
  const badgeTxt = r.type === 'event' ? '이벤트' : '공지';

  const row = document.createElement('div');
  row.dataset.id = r.id;
  row.className = 'notice-row';

  const adminBtns = isAdmin ? `
    <button class="btn-row-edit" onclick="editItem(${r.id},'notice');event.stopPropagation()">수정</button>
    <button class="btn-pin ${r.pinned ? 'on' : 'off'}" id="pin-${r.id}" onclick="togglePin(${r.id});event.stopPropagation()">${r.pinned ? '공지중' : '숨김'}</button>
    <button class="btn-row-del" onclick="deleteItem(${r.id},'notice');event.stopPropagation()">삭제</button>` : '';

  row.innerHTML = `
    <div class="nr-title">
      <span class="notice-badge ${badgeCls}">${badgeTxt}</span>
      <span class="title-text">${r.title}</span>
    </div>
    <div class="nr-right">
      ${adminBtns}
      <span class="nr-date">${r.created_at?.slice(0,10)||''}</span>
    </div>`;

  row.onclick = () => location.href = `/post.html?id=${r.id}`;
  return [row];
}

// ── 명언 행 렌더 ─────────────────────────────────────────────────────
function renderQuoteRow(r, isToday) {
  const row = document.createElement('div');
  row.className = 'notice-row' + (isToday ? ' open' : '');
  row.dataset.id = r.id;

  const adminBtns = isAdmin ? `
    <button class="btn-row-edit" onclick="editItem(${r.id},'quote');event.stopPropagation()">수정</button>
    <button class="btn-row-del" onclick="deleteItem(${r.id},'quote');event.stopPropagation()">삭제</button>` : '';

  row.innerHTML = `
    <div class="nr-title">
      <span class="notice-badge badge-quote">명언</span>
      ${isToday ? '<span style="font-size:.72rem;background:var(--color-primary);color:#fff;padding:.1rem .4rem;border-radius:4px;font-weight:700;flex-shrink:0">오늘</span>' : ''}
      <span class="title-text">💬 ${r.author || '오늘의 명언'}</span>
      <i class="ti ti-chevron-down notice-chevron"></i>
    </div>
    <div class="nr-right">
      ${adminBtns}
      <span class="nr-date">${r.created_at?.slice(0,10)||''}</span>
    </div>`;

  const expand = document.createElement('div');
  expand.className = 'notice-expand';
  expand.style.display = isToday ? 'block' : 'none';
  expand.innerHTML = `"${r.content}"${r.author ? `<span class="q-author">— ${r.author}</span>` : ''}`;

  row.onclick = () => {
    row.classList.toggle('open');
    expand.style.display = row.classList.contains('open') ? 'block' : 'none';
  };

  return [row, expand];
}

// ── 공지/이벤트 로드 ────────────────────────────────────────────────
async function loadNoticeRows(reset) {
  const { rows, total: t } = await api(`/api/challenges/notices/all?type=${currentType}&page=${page}&limit=${LIMIT}`);
  totalCount = t;
  const el = document.getElementById('notice-list');
  if (reset && !rows.length) {
    el.innerHTML = '<p style="padding:var(--sp-5);color:var(--color-text-muted)">등록된 공지가 없습니다.</p>';
    return;
  }
  rows.forEach(r => renderNoticeRow(r).forEach(n => el.appendChild(n)));
}

// ── 명언 로드 ────────────────────────────────────────────────────────
async function loadQuoteRows(reset) {
  const { rows, total: t } = await api(`/api/challenges/quotes/list?page=${page}&limit=${LIMIT}`);
  totalCount = t;
  const el = document.getElementById('notice-list');
  if (reset && !rows.length) {
    el.innerHTML = '<p style="padding:var(--sp-5);color:var(--color-text-muted)">등록된 명언이 없습니다.</p>';
    return;
  }
  const todayIdx = todayQuoteIdx(rows);
  rows.forEach((r, i) => renderQuoteRow(r, i === todayIdx).forEach(n => el.appendChild(n)));
}

// ── 통합 로드 ────────────────────────────────────────────────────────
async function loadNotices(reset = true) {
  if (reset) {
    page = 1;
    document.getElementById('notice-list').innerHTML = '<p style="padding:var(--sp-5);color:var(--color-text-muted)">불러오는 중...</p>';
  }
  try {
    if (reset) document.getElementById('notice-list').innerHTML = '';
    if (currentType === 'quote') await loadQuoteRows(reset);
    else await loadNoticeRows(reset);
    document.getElementById('total-count').textContent = `총 ${totalCount}건`;
    document.getElementById('load-more').style.display = page * LIMIT < totalCount ? 'block' : 'none';
  } catch(e) {
    document.getElementById('notice-list').innerHTML =
      '<p style="padding:var(--sp-5);color:var(--color-text-muted)">불러오기 실패</p>';
  }
}

function loadMore() { page++; loadNotices(false); }

function setFilter(type, btn) {
  currentType = type;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  loadNotices(true);
}

// ── 공지 메인 표시 토글 ──────────────────────────────────────────────
async function togglePin(id) {
  try {
    const r = await api(`/api/challenges/notices/${id}/pin`, { method:'PATCH' });
    const btn = document.getElementById(`pin-${id}`);
    if (btn) {
      btn.textContent = r.pinned ? '공지중' : '숨김';
      btn.className = `btn-pin ${r.pinned ? 'on' : 'off'}`;
    }
    showToast(r.pinned ? '커뮤니티 메인에 표시됩니다.' : '커뮤니티 메인에서 숨겨집니다.');
  } catch(e) { showToast(e.message, 'error'); }
}

// ── 삭제 ────────────────────────────────────────────────────────────
async function deleteItem(id, type) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  try {
    const url = type === 'quote'
      ? `/api/challenges/quotes/${id}`
      : `/api/challenges/notices/${id}`;
    await api(url, { method:'DELETE' });
    showToast('삭제되었습니다.');
    loadNotices(true);
  } catch(e) { showToast(e.message, 'error'); }
}

// ── 모달 열기 ────────────────────────────────────────────────────────
function openModal(mode, data = null) {
  modalMode = mode;
  editId    = data?.id ?? null;

  const isQuote = (mode === 'quote');
  const isEdit  = data !== null;

  document.getElementById('modal-heading').textContent =
    isEdit ? (isQuote ? '명언 수정' : '공지 수정') : (isQuote ? '명언 등록' : '공지 등록');
  document.getElementById('modal-submit-btn').textContent = isEdit ? '수정하기' : '등록하기';

  document.getElementById('modal-type-row').style.display    = isQuote ? 'none' : '';
  document.getElementById('modal-author-row').style.display  = isQuote ? '' : 'none';
  document.getElementById('modal-title-row').style.display   = isQuote ? 'none' : '';
  document.getElementById('modal-image-row').style.display   = isQuote ? 'none' : '';
  document.getElementById('modal-pinned-row').style.display  = isQuote ? 'none' : '';
  document.getElementById('m-content-label').innerHTML =
    isQuote ? '명언 내용' : '내용 <span style="font-weight:400;color:var(--color-text-muted)">(선택)</span>';
  document.getElementById('m-content').placeholder =
    isQuote ? '명언 내용을 입력하세요' : '본문 내용을 입력하세요 (클릭 시 펼쳐집니다)';

  // 필드 초기화
  document.getElementById('m-content').value  = data?.content || '';
  document.getElementById('m-image').value    = '';
  document.getElementById('m-img-preview').style.display = 'none';

  if (!isQuote) {
    const tv = data?.type || 'notice';
    const radio = document.querySelector(`input[name="m-type"][value="${tv}"]`);
    if (radio) radio.checked = true;
    document.getElementById('m-title').value  = data?.title || '';
    document.getElementById('m-pinned').checked = data ? !!data.pinned : true;
  } else {
    document.getElementById('m-author').value = data?.author || '';
  }

  document.getElementById('write-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('write-modal').style.display = 'none';
  editId = null;
}

// 수정 버튼 → 데이터 불러와 모달 열기
async function editItem(id, type) {
  try {
    if (type === 'notice') {
      const { rows } = await api('/api/challenges/notices/all?page=1&limit=1000');
      const row = rows.find(r => r.id === id);
      if (row) openModal('notice', row);
    } else {
      const { rows } = await api('/api/challenges/quotes/list?page=1&limit=1000');
      const row = rows.find(r => r.id === id);
      if (row) openModal('quote', row);
    }
  } catch(e) { showToast('데이터를 불러올 수 없습니다.', 'error'); }
}

// ── 모달 제출 ────────────────────────────────────────────────────────
async function submitModal() {
  const isQuote = (modalMode === 'quote');
  const isEdit  = editId !== null;

  try {
    if (isQuote) {
      const content = document.getElementById('m-content').value.trim();
      if (!content) { showToast('명언 내용을 입력해주세요.', 'error'); return; }
      const author = document.getElementById('m-author').value.trim();
      const method = isEdit ? 'PUT' : 'POST';
      const url    = isEdit ? `/api/challenges/quotes/${editId}` : '/api/challenges/quotes';
      await api(url, { method, body: { content, author } });
      showToast(isEdit ? '명언이 수정되었습니다.' : '명언이 등록되었습니다.');
      if (!isEdit) setFilter('quote', document.querySelector('[data-type="quote"]'));
    } else {
      const title = document.getElementById('m-title').value.trim();
      if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }

      const fd = new FormData();
      fd.append('type',    document.querySelector('input[name="m-type"]:checked').value);
      fd.append('title',   title);
      fd.append('content', document.getElementById('m-content').value.trim());
      fd.append('pinned',  document.getElementById('m-pinned').checked ? '1' : '0');
      const imgFile = document.getElementById('m-image').files[0];
      if (imgFile) fd.append('image', imgFile);

      const method = isEdit ? 'PUT' : 'POST';
      const url    = isEdit ? `/api/challenges/notices/${editId}` : '/api/challenges/notices';
      await api(url, { method, body: fd });
      showToast(isEdit ? '공지가 수정되었습니다.' : '공지가 등록되었습니다.');
    }
    closeModal();
    loadNotices(true);
  } catch(e) {
    showToast(e.message || '처리 중 오류가 발생했습니다.', 'error');
  }
}

document.getElementById('write-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('DOMContentLoaded', async () => {
  loadNotices(true);
  const { user } = await api('/api/auth/me');
  if (user?.role === 'admin') {
    isAdmin = true;
    document.getElementById('admin-bar').style.display = 'flex';
  }
});
</script>
</body>
</html>
