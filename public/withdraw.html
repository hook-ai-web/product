<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원 탈퇴 — 2막이음</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="icon" type="image/svg+xml" href="/icons/2mak_ieum_favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .withdraw-box {
      max-width: 540px;
      margin: 0 auto;
    }
    .notice-box {
      background: #fff8f0;
      border: 1px solid #f5c6a0;
      border-radius: var(--radius-md);
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.5rem;
    }
    .notice-box .notice-title {
      font-weight: 700;
      color: #c2410c;
      margin-bottom: .75rem;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .notice-list {
      list-style: disc;
      padding-left: 1.2rem;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: .55rem;
    }
    .notice-list li {
      font-size: .92rem;
      color: #7c3f15;
      line-height: 1.65;
    }
    .notice-list li strong {
      color: #9a3412;
    }
    .reason-box {
      background: var(--surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.5rem;
    }
    .reason-box label {
      font-weight: 600;
      font-size: .95rem;
      display: block;
      margin-bottom: .75rem;
    }
    .reason-options {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      margin-bottom: .9rem;
    }
    .reason-option {
      display: flex;
      align-items: center;
      gap: .55rem;
      font-size: .93rem;
      cursor: pointer;
    }
    .reason-option input[type="radio"] {
      width: 17px; height: 17px; flex-shrink: 0; cursor: pointer;
    }
    .reason-other {
      width: 100%;
      margin-top: .5rem;
      padding: .55rem .8rem;
      font-size: .93rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      resize: vertical;
      min-height: 72px;
      font-family: inherit;
    }
    .confirm-check {
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      margin-bottom: 1.5rem;
      font-size: .93rem;
      line-height: 1.5;
      cursor: pointer;
    }
    .confirm-check input { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; cursor: pointer; }
    .btn-area {
      display: flex;
      gap: .75rem;
    }
    .btn-cancel-withdraw {
      flex: 1;
      padding: .85rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--color-text);
    }
    .btn-cancel-withdraw:hover { background: var(--color-bg-subtle); }
    .btn-do-withdraw {
      flex: 1;
      padding: .85rem;
      border: none;
      border-radius: var(--radius-md);
      background: var(--danger, #dc2626);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      opacity: .45;
      pointer-events: none;
      transition: opacity .15s;
    }
    .btn-do-withdraw.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
<div id="header-wrap"></div>
<main class="container" style="padding-top:2rem;padding-bottom:4rem">
  <div class="withdraw-box">

    <h2 style="margin-bottom:1.5rem">회원 탈퇴</h2>

    <!-- 안내 사항 -->
    <div class="notice-box">
      <div class="notice-title">
        <i class="ti ti-alert-triangle"></i> 탈퇴 전 꼭 확인해주세요
      </div>
      <ul class="notice-list">
        <li>탈퇴 후 <strong>계정 정보(이메일, 닉네임, 연락처)는 즉시 삭제</strong>되며 복구할 수 없습니다.</li>
        <li><strong>작성하신 글과 댓글은 자동으로 삭제되지 않습니다.</strong> 탈퇴 전 직접 삭제하시거나, 탈퇴 후 '익명'으로 남게 됩니다.</li>
        <li>탈퇴 후 동일한 이메일로 재가입이 가능하지만, 이전 데이터는 복구되지 않습니다.</li>
        <li>카카오·네이버·구글 연동은 해당 서비스에서 별도로 해제해야 합니다.</li>
      </ul>
    </div>

    <!-- 탈퇴 사유 (선택) -->
    <div class="reason-box">
      <label>탈퇴 사유 <span style="font-weight:400;color:var(--color-text-muted)">(선택)</span></label>
      <div class="reason-options">
        <label class="reason-option">
          <input type="radio" name="reason" value="사용 빈도가 낮아서"> 사용 빈도가 낮아서
        </label>
        <label class="reason-option">
          <input type="radio" name="reason" value="원하는 콘텐츠가 부족해서"> 원하는 콘텐츠가 부족해서
        </label>
        <label class="reason-option">
          <input type="radio" name="reason" value="개인정보 보호를 위해"> 개인정보 보호를 위해
        </label>
        <label class="reason-option">
          <input type="radio" name="reason" value="서비스 불편함"> 서비스 이용이 불편해서
        </label>
        <label class="reason-option">
          <input type="radio" name="reason" value="기타" id="reason-other-radio"> 기타 (직접 입력)
        </label>
      </div>
      <textarea id="reason-other-text" class="reason-other" placeholder="탈퇴 사유를 입력해주세요." style="display:none"></textarea>
    </div>

    <!-- 확인 체크 -->
    <label class="confirm-check">
      <input type="checkbox" id="confirm-check" onchange="syncBtn()">
      위 안내 사항을 모두 확인했으며, 회원 탈퇴에 동의합니다.
    </label>

    <!-- 버튼 -->
    <div class="btn-area">
      <button class="btn-cancel-withdraw" onclick="history.back()">취소</button>
      <button class="btn-do-withdraw" id="btn-withdraw" onclick="doWithdraw()">탈퇴하기</button>
    </div>

  </div>
</main>
<div id="footer-wrap"></div>

<script src="/js/common.js"></script>
<script>
// 로그인 확인
(async () => {
  const { loggedIn } = await api('/api/auth/me');
  if (!loggedIn) location.href = '/login.html';
})();

// "기타" 선택 시 텍스트에어리어 표시
document.querySelectorAll('[name="reason"]').forEach(r => {
  r.addEventListener('change', () => {
    const isOther = document.getElementById('reason-other-radio').checked;
    document.getElementById('reason-other-text').style.display = isOther ? 'block' : 'none';
  });
});

function syncBtn() {
  const checked = document.getElementById('confirm-check').checked;
  document.getElementById('btn-withdraw').classList.toggle('active', checked);
}

function getReason() {
  const selected = document.querySelector('[name="reason"]:checked');
  if (!selected) return '';
  if (selected.value === '기타') {
    return document.getElementById('reason-other-text').value.trim() || '기타';
  }
  return selected.value;
}

async function doWithdraw() {
  if (!document.getElementById('confirm-check').checked) return;

  const ok = confirm('정말 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.');
  if (!ok) return;

  try {
    await api('/api/auth/account', { method: 'DELETE', body: { reason: getReason() } });
    alert('탈퇴가 완료되었습니다. 그동안 2막이음을 이용해 주셔서 감사합니다.');
    location.href = '/index.html';
  } catch(err) {
    showToast(err.message || '오류가 발생했습니다.', 'error');
  }
}
</script>
</body>
</html>
